name: Tests

on:
  push:
    branches: master
  pull_request:
    branches: master

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
        # macOS dropped 2026-04-26: GHA macOS runners have no Docker, so
        # testcontainers-postgres (used by the Postgres conftest fixture)
        # cannot start. SpiderFoot deploys as a Linux container — macOS is
        # not a supported runtime.
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r test/requirements.txt
      - name: Lint with flake8
        run: |
          # stop the build if there are Python Flake8 violations
          flake8 . --count --show-source --statistics
      - name: Test with pytest
        run: |
          python -m pytest -n auto --dist loadfile --ignore=test/integration/modules/ --durations=5 --cov-report term --cov=. .
      - uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false
          verbose: true
