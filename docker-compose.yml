# Basic usage:
#     $ docker-compose up
#
# Dev environment (code directory mapped into container):
#     $ docker-compose -f docker-compose.yml -f docker-compose-dev.yml up
#
# Full image (all CLI tools installed):
#     $ docker-compose -f docker-compose.yml -f docker-compose-full.yml up
#
# Spiderfoot data resides in a Docker volume
#
#     $ ls -lh /var/lib/docker/volumes/spiderfoot_spiderfoot-data/_data
#       total 104K
#       drwxr-xr-x 2 user user 4.0K Sep 22 09:51 cache
#       -rw-r--r-- 1 user user 100K Sep 22 15:19 spiderfoot.db

services:
  spiderfoot:
    build:
      context: ./
    volumes:
      - spiderfoot-data:/var/lib/spiderfoot
    image: spiderfoot
    container_name: spiderfoot
    ports:
      - "5001:5001"
    restart: unless-stopped

  # Dev Postgres for SpiderFoot storage migration.
  # Host port 55432 (not 5432) to avoid clashing with a system Postgres
  # that some developers already run locally. Connection URL:
  #   postgresql://spiderfoot:dev@localhost:55432/spiderfoot
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: spiderfoot
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: spiderfoot
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - spiderfoot-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spiderfoot -d spiderfoot"]
      interval: 2s
      timeout: 2s
      retries: 30

volumes:
  spiderfoot-data:
  spiderfoot-pg:
